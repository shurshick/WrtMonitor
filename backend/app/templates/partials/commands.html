<div>
  <h2>Последние команды</h2>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Команда</th><th>Статус</th><th>Обновлено</th><th>Результат</th></tr></thead>
      <tbody>{% for command in commands %}
        <tr>
          <td><code>{{ command.command_type }}</code></td>
          <td><span class="status status--{{ command.status|lower }}">{{ command.status }}</span></td>
          <td>{{ command.updated_at }}</td><td><code>{{ command.result or {} }}</code></td>
        </tr>
      {% else %}<tr><td class="empty-state" colspan="4">Команд пока нет</td></tr>{% endfor %}</tbody>
    </table>
  </div>
</div>
