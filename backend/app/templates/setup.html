{% extends "base.html" %}
{% block title %}WrtMonitor - Первая настройка{% endblock %}
{% block page_class %}page--narrow{% endblock %}
{% block content %}
<section class="card card--form"><p class="eyebrow">WrtMonitor</p><h1>Первая настройка</h1><p class="page-heading__description">Создайте администратора и укажите внешний адрес сервера.</p>
<form class="form-stack" method="post" action="/setup"><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><label>Администратор<input name="username" autocomplete="username" required minlength="3"></label><label>Пароль<input name="password" type="password" autocomplete="new-password" required minlength="8"></label><label>Повторите пароль<input name="password_confirm" type="password" autocomplete="new-password" required minlength="8"></label><label>Публичный адрес сервера<input name="server_url" placeholder="https://monitor.example.ru" required></label><button type="submit">Создать</button></form>
</section>
{% endblock %}
