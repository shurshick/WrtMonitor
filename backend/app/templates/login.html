{% extends "base.html" %}
{% block title %}WrtMonitor - Вход{% endblock %}
{% block page_class %}page--narrow{% endblock %}
{% block content %}
<section class="card card--form"><p class="eyebrow">WrtMonitor</p><h1>Вход в сервер</h1><p class="page-heading__description">Используйте учётную запись администратора.</p>
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<form class="form-stack" method="post" action="/login"><label>Администратор<input name="username" autocomplete="username" required></label><label>Пароль<input name="password" type="password" autocomplete="current-password" required></label><button type="submit">Войти</button></form>
</section>
{% endblock %}
